name: CI

on:
  pull_request:
  push:
    branches: [main, develop, B]

permissions:
  contents: read

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:contracts
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Verify Drizzle migrations are committed
        env:
          DATABASE_URL: postgresql://migration:validation@localhost:5432/housemouse
        run: |
          pnpm --filter @housemouse/database db:generate
          git diff --exit-code -- packages/database/migrations

  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build
      - run: flutter analyze
      - run: flutter test
