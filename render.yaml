services:
  - type: web
    name: mousekeeper-server
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @mousekeeper/contracts build && pnpm --filter @mousekeeper/database build && pnpm --filter @mousekeeper/server build
    preDeployCommand: pnpm --filter @mousekeeper/database db:migrate
    startCommand: pnpm --filter @mousekeeper/server start:prod
    healthCheckPath: /ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: SERVER_HOST
        value: "0.0.0.0"
      - key: DATABASE_URL
        fromDatabase: { name: mousekeeper-postgres, property: connectionString }
      - key: REDIS_URL
        fromService:
          {
            type: keyvalue,
            name: mousekeeper-key-value,
            property: connectionString,
          }
      - key: WEB_ORIGIN
        sync: false
      - key: JWT_OR_DEVICE_TOKEN_SECRET
        generateValue: true
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: FILE_TRANSFER_MAX_BYTES
        value: "104857600"
      - key: FILE_TRANSFER_TTL_SECONDS
        value: "600"
      - key: SMART_CACHE_ENABLED
        value: "true"
      - key: SMART_CACHE_DEFAULT_ROOM_QUOTA_BYTES
        value: "524288000"
      - key: SMART_CACHE_DEFAULT_MAX_FILE_BYTES
        value: "52428800"
      - key: OBJECT_STORAGE_ENDPOINT
        sync: false
      - key: OBJECT_STORAGE_REGION
        sync: false
      - key: OBJECT_STORAGE_BUCKET
        sync: false
      - key: OBJECT_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
        sync: false

  - type: worker
    name: mousekeeper-worker
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @mousekeeper/database build
    startCommand: pnpm --filter @mousekeeper/worker start
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: mousekeeper-postgres, property: connectionString }
      - key: OBJECT_STORAGE_ENDPOINT
        sync: false
      - key: OBJECT_STORAGE_REGION
        sync: false
      - key: OBJECT_STORAGE_BUCKET
        sync: false
      - key: OBJECT_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: OBJECT_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: FILE_TRANSFER_TTL_SECONDS
        value: "600"
      - key: FCM_ENABLED
        value: "false"
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: keyvalue
    name: mousekeeper-key-value
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

databases:
  - name: mousekeeper-postgres
    plan: free
    postgresMajorVersion: "17"
    databaseName: mousekeeper
    user: mousekeeper
    ipAllowList: []
